name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Make Gradle wrapper executable (Linux)
        run: chmod +x ./gradlew

      - name: Set up Android SDK (API 34 + build-tools)
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Set up Gradle and caching
        uses: gradle/actions/setup-gradle@v3

      - name: Assemble Debug
        run: ./gradlew --no-daemon assembleDebug

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest
